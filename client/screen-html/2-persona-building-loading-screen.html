<!doctype html>

<html class="dark" lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>Proxima - Loading Persona</title>
        <link href="https://fonts.googleapis.com" rel="preconnect" />
        <link
            crossorigin=""
            href="https://fonts.gstatic.com"
            rel="preconnect"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
            rel="stylesheet"
        />
        <!-- BEGIN: Tailwind Configuration -->
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <script id="tailwind-config">
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            primary: "#0db9f2",
                            "surface-base": "#0c1215",
                            "surface-panel": "#141c21",
                            "surface-hover": "#1a252b",
                            "border-subtle": "#22313a",
                            "text-main": "#cbd5e1",
                            "text-muted": "#64748b",
                            success: "#10b981",
                            warning: "#f59e0b",
                            danger: "#ef4444",
                        },
                        fontFamily: {
                            display: ["Manrope", "sans-serif"],
                        },
                    },
                },
            };
        </script>
        <!-- END: Tailwind Configuration -->
        <!-- BEGIN: Custom Styles -->
        <style data-purpose="material-icons">
            .material-symbols-outlined {
                font-variation-settings:
                    "FILL" 0,
                    "wght" 400,
                    "GRAD" 0,
                    "opsz" 24;
                font-size: 20px !important;
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }
            .material-symbols-outlined.text-40px {
                font-size: 40px !important;
            }
        </style>
        <style data-purpose="animations">
            @keyframes slow-spin {
                from {
                    transform: rotate(0deg);
                }
                to {
                    transform: rotate(360deg);
                }
            }
            .animate-spin-custom {
                animation: slow-spin 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            }
        </style>
        <!-- END: Custom Styles -->
    </head>
    <body
        class="h-screen w-full flex flex-col overflow-hidden bg-surface-base text-text-main font-display antialiased"
    >
        <!-- BEGIN: Background Skeleton (Inactive Interface) -->
        <div
            class="absolute inset-0 flex flex-col opacity-20 select-none z-0 pointer-events-none bg-surface-base"
            data-purpose="background-skeleton"
        >
            <!-- Top Header -->
            <header
                class="h-16 w-full border-b border-border-subtle bg-surface-panel flex items-center px-6 justify-between"
            >
                <div class="flex items-center gap-4">
                    <div class="w-8 h-8 rounded bg-border-subtle"></div>
                    <div class="w-32 h-4 rounded bg-border-subtle"></div>
                </div>
                <div class="flex gap-2">
                    <div class="w-20 h-8 rounded-full bg-border-subtle"></div>
                    <div class="w-8 h-8 rounded-full bg-border-subtle"></div>
                </div>
            </header>
            <!-- Main Viewport Layout -->
            <div class="flex-1 flex overflow-hidden">
                <!-- Grid Area -->
                <main
                    class="flex-1 p-6 flex flex-col items-center justify-center gap-6 relative"
                >
                    <div class="grid grid-cols-2 gap-6 w-full max-w-5xl">
                        <div
                            class="aspect-video bg-surface-panel border border-border-subtle rounded-2xl"
                        ></div>
                        <div
                            class="aspect-video bg-surface-panel border border-border-subtle rounded-2xl"
                        ></div>
                    </div>
                    <!-- Controls Pill -->
                    <div
                        class="absolute bottom-8 left-1/2 -translate-x-1/2 w-96 h-14 bg-surface-panel border border-border-subtle rounded-full flex items-center justify-evenly px-4"
                    >
                        <div
                            class="w-10 h-10 rounded-full bg-border-subtle"
                        ></div>
                        <div
                            class="w-10 h-10 rounded-full bg-border-subtle"
                        ></div>
                        <div class="w-10 h-10 rounded-full bg-danger/20"></div>
                        <div
                            class="w-10 h-10 rounded-full bg-border-subtle"
                        ></div>
                    </div>
                </main>
                <!-- Sidebar -->
                <aside
                    class="w-[400px] border-l border-border-subtle bg-surface-panel p-6 flex flex-col gap-6"
                >
                    <div class="w-1/2 h-6 bg-border-subtle rounded"></div>
                    <div class="space-y-4">
                        <div class="h-20 bg-border-subtle/50 rounded-xl"></div>
                        <div class="h-20 bg-border-subtle/50 rounded-xl"></div>
                        <div class="h-20 bg-border-subtle/50 rounded-xl"></div>
                    </div>
                </aside>
            </div>
        </div>
        <!-- END: Background Skeleton -->
        <!-- BEGIN: Foreground Modal (Loading Screen) -->
        <div
            class="absolute inset-0 z-50 flex items-center justify-center bg-[#0c1215]/85 backdrop-blur-xl"
            data-purpose="loading-overlay"
        >
            <!-- Modal Container -->
            <div
                class="w-full max-w-[420px] p-10 bg-surface-panel rounded-3xl border border-border-subtle shadow-[0_0_50px_rgba(0,0,0,0.5)] flex flex-col items-center text-center"
                data-purpose="loader-card"
            >
                <!-- Spinner Container -->
                <div
                    class="relative w-24 h-24 mb-8 flex items-center justify-center"
                >
                    <!-- Inner Icon -->
                    <span
                        class="material-symbols-outlined text-primary text-40px"
                        >psychology</span
                    >
                    <!-- Spinning Ring -->
                    <div
                        class="absolute inset-0 rounded-full border-2 border-surface-hover border-t-primary animate-spin-custom shadow-[0_0_15px_rgba(13,185,242,0.2)]"
                    ></div>
                </div>
                <!-- Text Content -->
                <h2
                    class="text-2xl font-bold text-text-main mb-3 tracking-tight"
                >
                    Configuring Persona
                </h2>
                <p class="text-sm text-text-muted leading-relaxed">
                    Processing uploaded CRM data and documents to build a highly
                    accurate, context-aware simulation...
                </p>
            </div>
        </div>
        <!-- END: Foreground Modal -->
    </body>
</html>
